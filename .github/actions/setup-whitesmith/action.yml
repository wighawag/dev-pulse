name: Setup whitesmith
description: Install Node.js, whitesmith, pi, and configure AI provider auth

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Configure git
      shell: bash
      run: |
        git config user.name "whitesmith[bot]"
        git config user.email "whitesmith[bot]@users.noreply.github.com"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Install dependencies
      shell: bash
      run: pnpm install

    - name: Build whitesmith
      shell: bash
      run: pnpm build

    - name: Link whitesmith globally
      shell: bash
      run: |
        pnpm setup
        source ~/.bashrc 2>/dev/null || true
        export PNPM_HOME="$HOME/.local/share/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        pnpm link --global

    - name: Install pi
      shell: bash
      run: |
        export PNPM_HOME="$HOME/.local/share/pnpm"
        export PATH="$PNPM_HOME:$PATH"
        pnpm add -g @mariozechner/pi-coding-agent

    - name: Configure pi models
      shell: bash
      run: |
        mkdir -p ~/.pi/agent
        cat > ~/.pi/agent/models.json << 'MODELS_EOF'
        {
          "providers": {
            "anthropic": {
              "baseUrl": "https://claude.etherplay.io",
              "api": "anthropic-messages",
              "apiKey": "CLAUDE_API_KEY",
              "models": [
                {
                  "id": "claude-opus-4-6"
                }
              ]
            }
          }
        }
        MODELS_EOF
