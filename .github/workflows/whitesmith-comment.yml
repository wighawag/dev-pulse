# NOTE: This file is generated in .generated-workflows/ because GitHub App tokens
# cannot push to .github/workflows/. Move it manually to .github/workflows/ to activate.
#
# This workflow requires the repo setting:
#   Settings → Actions → General → "Allow GitHub Actions to create and approve pull requests"
name: whitesmith-comment

on:
  issue_comment:
    types: [created]

concurrency:
  group: whitesmith-comment-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  run:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '/whitesmith')
    steps:
      - name: React with eyes to acknowledge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure git
        run: |
          git config user.name "whitesmith[bot]"
          git config user.email "whitesmith[bot]@users.noreply.github.com"

      - name: Setup pnpm
        if: github.repository == 'wighawag/whitesmith'
        uses: pnpm/action-setup@v4

      - name: Install or build whitesmith
        run: |
          if [ "${{ github.repository }}" = "wighawag/whitesmith" ]; then
            echo "Running in whitesmith repo — building from source"
            pnpm install
            pnpm run build
            pnpm link --global
          else
            npm install -g whitesmith
          fi

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Configure pi auth
        env:
          PI_AUTH_JSON: ${{ secrets.PI_AUTH_JSON }}
        run: |
          if [ -z "$PI_AUTH_JSON" ]; then
            echo "ERROR: PI_AUTH_JSON secret is not configured."
            echo "Set it to the contents of ~/.pi/agent/auth.json"
            exit 1
          fi
          mkdir -p ~/.pi/agent
          echo "$PI_AUTH_JSON" > ~/.pi/agent/auth.json
          chmod 600 ~/.pi/agent/auth.json
          echo "Configured pi auth from PI_AUTH_JSON"

      - name: Determine if PR or issue
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"

          PR_URL="${{ github.event.issue.pull_request.url }}"
          if [ -n "$PR_URL" ]; then
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            PR_BRANCH=$(gh pr view "$ISSUE_NUMBER" --json headRefName -q .headRefName)
            echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"

      - name: Build prompt for PR comment
        if: steps.context.outputs.is_pr == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.context.outputs.issue_number }}"
          ISSUE_TITLE="${{ steps.context.outputs.issue_title }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"
          PR_BRANCH="${{ steps.context.outputs.pr_branch }}"

          cat > .whitesmith-prompt.md << 'PROMPT_HEADER'
          # Agent Task from PR Comment

          PROMPT_HEADER

          PR_BODY=$(gh pr view "$ISSUE_NUMBER" --json body -q .body)

          cat >> .whitesmith-prompt.md << PROMPT_EOF
          ## Pull Request

          - **Title:** ${ISSUE_TITLE}
          - **URL:** ${ISSUE_URL}
          - **PR Number:** #${ISSUE_NUMBER}
          - **Branch:** ${PR_BRANCH}

          ### PR Description

          ${PR_BODY}

          ## Triggering Comment

          $(cat <<'COMMENT_BODY'
          ${{ github.event.comment.body }}
          COMMENT_BODY
          )

          ## Instructions

          You are working on a pull request. The comment above is a request from a reviewer or contributor.

          1. Check out the PR branch: \`git checkout ${PR_BRANCH}\`
          2. Read and understand the comment request.
          3. Make the requested changes.
          4. Commit your changes with a descriptive message.
          5. Push to the PR branch: \`git push origin ${PR_BRANCH}\`

          Do NOT create a new PR. Push directly to the existing PR branch.
          PROMPT_EOF

          echo "Prompt built:"
          cat .whitesmith-prompt.md

      - name: Build prompt for issue comment
        if: steps.context.outputs.is_pr != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.context.outputs.issue_number }}"
          ISSUE_TITLE="${{ steps.context.outputs.issue_title }}"
          ISSUE_URL="${{ github.event.issue.html_url }}"

          cat > .whitesmith-prompt.md << 'PROMPT_HEADER'
          # Agent Task from Issue Comment

          PROMPT_HEADER

          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)

          cat >> .whitesmith-prompt.md << PROMPT_EOF
          ## Issue

          - **Title:** ${ISSUE_TITLE}
          - **URL:** ${ISSUE_URL}
          - **Issue Number:** #${ISSUE_NUMBER}

          ### Issue Description

          ${ISSUE_BODY}

          ## Triggering Comment

          $(cat <<'COMMENT_BODY'
          ${{ github.event.comment.body }}
          COMMENT_BODY
          )

          ## Instructions

          You are responding to a comment on an issue (not a pull request).

          1. Read and understand the issue description and the triggering comment.
          2. You have full access to the repository code — read files, explore the codebase as needed.
          3. Analyze the request and formulate a helpful response.
          4. Write your response in Markdown to the file \`.whitesmith-response.md\`.

          Your response will be posted as a comment on the issue.
          Be thorough but concise. Include code snippets, file references, or suggestions as appropriate.
          Do NOT create branches, commits, or pull requests.
          PROMPT_EOF

          echo "Prompt built:"
          cat .whitesmith-prompt.md

      - name: Checkout PR branch
        if: steps.context.outputs.is_pr == 'true'
        run: |
          git checkout ${{ steps.context.outputs.pr_branch }}

      - name: Run pi
        id: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROVIDER="${{ vars.WHITESMITH_PROVIDER }}"
          MODEL="${{ vars.WHITESMITH_MODEL }}"
          if [ -z "$PROVIDER" ] || [ -z "$MODEL" ]; then
            echo "ERROR: WHITESMITH_PROVIDER and WHITESMITH_MODEL repository variables are required."
            exit 1
          fi
          pi --prompt-file .whitesmith-prompt.md \
            --provider "$PROVIDER" \
            --model "$MODEL"

      - name: Post issue comment response
        if: steps.context.outputs.is_pr != 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .whitesmith-response.md ]; then
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body-file .whitesmith-response.md
          else
            gh issue comment ${{ github.event.issue.number }} \
              --repo ${{ github.repository }} \
              --body "🤖 Agent completed but did not produce a response file. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

      - name: React with checkmark on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="+1"

      - name: React with X and comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content="-1"
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "❌ Agent run failed for [this comment](${{ github.event.comment.html_url }}). Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
